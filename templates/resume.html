<!DOCTYPE html>
<html>

<head>

<title>Resume Builder</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Resume Builder</h1>

<form action="/generate_resume" method="POST">

<input type="text" name="name" placeholder="Enter your name" required><br><br>

<input type="text" name="skills" placeholder="Enter skills (comma separated)" required><br><br>

<input type="text" name="education" placeholder="Enter education" required><br><br>

<button type="submit">Generate Resume</button>

</form>

<br>

{% if generated %}

<div class="result">

<h2>{{name}}</h2>

<p><strong>Education:</strong> {{education}}</p>

<p><strong>Skills:</strong> {{skills}}</p>

<h3>Projects</h3>
<p>AI Interview System</p>

<h3>Objective</h3>
<p>Motivated individual seeking opportunities to grow.</p>

</div>

<br>

<form action="/download_resume" method="POST">

<input type="hidden" name="name" value="{{name}}">
<input type="hidden" name="skills" value="{{skills}}">
<input type="hidden" name="education" value="{{education}}">

<button type="submit">Download PDF</button>

</form>

{% endif %}

<br>

<a href="/">
<button>Back to Home</button>
</a>

</div>

</body>

</html>
